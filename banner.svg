<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0a2e1a; }
      .phone-screen { fill: #0d1f17; }
      .wa-header { fill: #075e54; }
      .wa-avatar { fill: #128c7e; }
      .msg-user { fill: #005c4b; }
      .msg-bot { fill: #202c33; }
      .input-bar { fill: #1f2c34; }
      .input-field { fill: #2a3942; }
      .send-btn { fill: #00a884; }
      .text-white { fill: #e9edef; font-family: Arial, sans-serif; font-size: 10px; }
      .text-green { fill: #4ade80; font-family: Arial, sans-serif; }
      .text-muted { fill: #8696a0; font-family: Arial, sans-serif; font-size: 8px; }
      .text-header { fill: #ffffff; font-family: Arial, sans-serif; }
      .text-online { fill: #a7d5d0; font-family: Arial, sans-serif; font-size: 9px; }
      .feature-pill { fill: #4ade8026; }
      .feature-text { fill: #4ade80; font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
      .stack-bg { fill: #1a4731; }
      .stack-text { fill: #4ade80; font-family: monospace; font-size: 10px; }
      .flow-node { fill: #1a4a34; stroke: #2a6a4a; stroke-width: 0.5; }
      .flow-node-accent { fill: #128c7e40; stroke: #128c7e; stroke-width: 0.5; }
      .flow-text { fill: #86efac; font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; }
      .flow-text-accent { fill: #4ade80; font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; }
      .flow-line { stroke: #4ade80; stroke-width: 1; stroke-opacity: 0.5; fill: none; }
      .dot { fill: #4ade8012; }
      .title-main { fill: #ffffff; font-family: Arial, sans-serif; font-size: 38px; font-weight: bold; }
      .title-accent { fill: #4ade80; font-family: Arial, sans-serif; font-size: 38px; font-weight: bold; }
      .subtitle { fill: #4ade80; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; letter-spacing: 2px; }
      .divider { stroke: #4ade80; stroke-width: 1.5; stroke-opacity: 0.5; }

      /* Message animations */
      #msg1 { opacity: 0; animation: fadeIn 0.4s ease 0.5s forwards; }
      #msg2 { opacity: 0; animation: fadeIn 0.4s ease 1.4s forwards; }
      #msg3 { opacity: 0; animation: fadeIn 0.4s ease 2.6s forwards; }
      #msg4 { opacity: 0; animation: fadeIn 0.4s ease 3.5s forwards; }
      #msg5 { opacity: 0; animation: fadeIn 0.4s ease 4.7s forwards; }
      #msg6 { opacity: 0; animation: fadeIn 0.4s ease 5.6s forwards; }

      /* Typing indicators */
      #typing1 { opacity: 0; animation: typingAnim 0.9s ease 1.0s; }
      #typing2 { opacity: 0; animation: typingAnim 0.9s ease 2.2s; }
      #typing3 { opacity: 0; animation: typingAnim 0.9s ease 3.1s; }
      #typing4 { opacity: 0; animation: typingAnim 0.9s ease 4.3s; }
      #typing5 { opacity: 0; animation: typingAnim 0.9s ease 5.2s; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes typingAnim {
        0%   { opacity: 0; }
        20%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Dot bounce for typing */
      .dot1 { animation: bounce 1s ease 0s infinite; }
      .dot2 { animation: bounce 1s ease 0.2s infinite; }
      .dot3 { animation: bounce 1s ease 0.4s infinite; }
      @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-3px); }
      }

      /* Flow line draw animations */
      #flow-line1 { stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawLine 0.4s ease 0.3s forwards; }
      #flow-line2 { stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawLine 0.4s ease 0.7s forwards; }
      #flow-line3 { stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawLine 0.4s ease 1.1s forwards; }
      #flow-line4 { stroke-dasharray: 20; stroke-dashoffset: 20; animation: drawLine 0.4s ease 1.5s forwards; }
      #flow-n1 { opacity: 0; animation: fadeIn 0.3s ease 0.1s forwards; }
      #flow-n2 { opacity: 0; animation: fadeIn 0.3s ease 0.5s forwards; }
      #flow-n3 { opacity: 0; animation: fadeIn 0.3s ease 0.9s forwards; }
      #flow-n4 { opacity: 0; animation: fadeIn 0.3s ease 1.3s forwards; }
      #flow-n5 { opacity: 0; animation: fadeIn 0.3s ease 1.7s forwards; }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      /* Feature pills stagger */
      #pill1 { opacity: 0; animation: fadeIn 0.3s ease 0.2s forwards; }
      #pill2 { opacity: 0; animation: fadeIn 0.3s ease 0.5s forwards; }
      #pill3 { opacity: 0; animation: fadeIn 0.3s ease 0.8s forwards; }
      #pill4 { opacity: 0; animation: fadeIn 0.3s ease 1.1s forwards; }

      /* Pulse on online dot */
      #online-dot { animation: pulse 2s ease infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; r: 3; }
        50% { opacity: 0.6; r: 4; }
      }

      /* Title fade in */
      #title-block { opacity: 0; animation: fadeIn 0.5s ease 0s forwards; }
    </style>

    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </marker>
    <clipPath id="phone-clip">
      <rect x="240" y="28" width="200" height="344" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="400" class="bg"/>

  <!-- Grid dots -->
  <g class="dot">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/>
    <circle cx="160" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/>
    <circle cx="160" cy="80" r="1.5"/><circle cx="200" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/>
    <circle cx="160" cy="120" r="1.5"/>
    <circle cx="480" cy="40" r="1.5"/><circle cx="520" cy="40" r="1.5"/><circle cx="560" cy="40" r="1.5"/>
    <circle cx="600" cy="40" r="1.5"/><circle cx="640" cy="40" r="1.5"/>
    <circle cx="480" cy="80" r="1.5"/><circle cx="520" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/>
    <circle cx="600" cy="80" r="1.5"/><circle cx="480" cy="120" r="1.5"/><circle cx="520" cy="120" r="1.5"/>
    <circle cx="560" cy="120" r="1.5"/>
  </g>

  <!-- LEFT: Title -->
  <g id="title-block">
    <text x="40" y="90" class="subtitle">MARKETMATE</text>
    <text x="40" y="130" class="title-main">WhatsApp</text>
    <text x="40" y="172" class="title-accent">AI Bot</text>
    <line x1="40" y1="192" x2="180" y2="192" class="divider"/>
  </g>

  <!-- Feature pills -->
  <g id="pill1">
    <rect x="40" y="206" width="130" height="24" rx="12" class="feature-pill"/>
    <text x="105" y="222" text-anchor="middle" class="feature-text">🌍 Multilingual AI</text>
  </g>
  <g id="pill2">
    <rect x="40" y="236" width="152" height="24" rx="12" class="feature-pill"/>
    <text x="116" y="252" text-anchor="middle" class="feature-text">📦 Order tracking</text>
  </g>
  <g id="pill3">
    <rect x="40" y="266" width="138" height="24" rx="12" class="feature-pill"/>
    <text x="109" y="282" text-anchor="middle" class="feature-text">🦙 Ollama offline</text>
  </g>
  <g id="pill4">
    <rect x="40" y="296" width="148" height="24" rx="12" class="feature-pill"/>
    <text x="114" y="312" text-anchor="middle" class="feature-text">🚀 Render deploy</text>
  </g>

  <!-- Stack badges -->
  <rect x="40" y="344" width="60" height="20" rx="4" class="stack-bg"/>
  <text x="70" y="358" text-anchor="middle" class="stack-text">Python</text>
  <rect x="108" y="344" width="60" height="20" rx="4" class="stack-bg"/>
  <text x="138" y="358" text-anchor="middle" class="stack-text">FastAPI</text>
  <rect x="176" y="344" width="52" height="20" rx="4" class="stack-bg"/>
  <text x="202" y="358" text-anchor="middle" class="stack-text">Ollama</text>

  <!-- PHONE frame -->
  <rect x="240" y="28" width="200" height="344" rx="20" fill="#111" stroke="#2a5a3a" stroke-width="1.5"/>
  <rect x="310" y="32" width="60" height="8" rx="4" fill="#1a2e1a"/>
  <rect x="244" y="48" width="192" height="316" class="phone-screen" clip-path="url(#phone-clip)"/>

  <!-- WA Header -->
  <rect x="244" y="48" width="192" height="44" class="wa-header"/>
  <circle cx="264" cy="70" r="12" class="wa-avatar"/>
  <text x="264" y="74" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">M</text>
  <text x="282" y="65" font-family="Arial" font-size="11" font-weight="bold" fill="white">MarketMate</text>
  <text x="282" y="79" class="text-online">online</text>
  <circle id="online-dot" cx="275" cy="79" r="3" fill="#4ade80"/>

  <!-- Typing indicators -->
  <g id="typing1">
    <rect x="248" y="102" width="60" height="22" rx="8" class="msg-bot"/>
    <circle cx="262" cy="113" r="3" fill="#8696a0" class="dot1"/>
    <circle cx="272" cy="113" r="3" fill="#8696a0" class="dot2"/>
    <circle cx="282" cy="113" r="3" fill="#8696a0" class="dot3"/>
  </g>
  <g id="typing2">
    <rect x="248" y="156" width="60" height="22" rx="8" class="msg-bot"/>
    <circle cx="262" cy="167" r="3" fill="#8696a0" class="dot1"/>
    <circle cx="272" cy="167" r="3" fill="#8696a0" class="dot2"/>
    <circle cx="282" cy="167" r="3" fill="#8696a0" class="dot3"/>
  </g>
  <g id="typing3">
    <rect x="248" y="210" width="60" height="22" rx="8" class="msg-bot"/>
    <circle cx="262" cy="221" r="3" fill="#8696a0" class="dot1"/>
    <circle cx="272" cy="221" r="3" fill="#8696a0" class="dot2"/>
    <circle cx="282" cy="221" r="3" fill="#8696a0" class="dot3"/>
  </g>
  <g id="typing4">
    <rect x="248" y="262" width="60" height="22" rx="8" class="msg-bot"/>
    <circle cx="262" cy="273" r="3" fill="#8696a0" class="dot1"/>
    <circle cx="272" cy="273" r="3" fill="#8696a0" class="dot2"/>
    <circle cx="282" cy="273" r="3" fill="#8696a0" class="dot3"/>
  </g>
  <g id="typing5">
    <rect x="248" y="316" width="60" height="22" rx="8" class="msg-bot"/>
    <circle cx="262" cy="327" r="3" fill="#8696a0" class="dot1"/>
    <circle cx="272" cy="327" r="3" fill="#8696a0" class="dot2"/>
    <circle cx="282" cy="327" r="3" fill="#8696a0" class="dot3"/>
  </g>

  <!-- Chat messages -->
  <g id="msg1">
    <rect x="294" y="100" width="128" height="28" rx="8" class="msg-user"/>
    <text x="306" y="119" class="text-white">Siparişim nerede?</text>
  </g>
  <g id="msg2">
    <rect x="248" y="134" width="150" height="40" rx="8" class="msg-bot"/>
    <text x="258" y="150" class="text-white">MM-1078 durumu:</text>
    <text x="258" y="166" font-family="Arial" font-size="10" fill="#4ade80">🚚 Yolda — bugün teslim</text>
  </g>
  <g id="msg3">
    <rect x="289" y="184" width="133" height="28" rx="8" class="msg-user"/>
    <text x="301" y="203" class="text-white">Where is my order?</text>
  </g>
  <g id="msg4">
    <rect x="248" y="222" width="152" height="28" rx="8" class="msg-bot"/>
    <text x="258" y="241" class="text-white">Your items are on the way!</text>
  </g>
  <g id="msg5">
    <rect x="295" y="260" width="127" height="28" rx="8" class="msg-user"/>
    <text x="307" y="278" class="text-white">Ich habe ein Problem</text>
  </g>
  <g id="msg6">
    <rect x="248" y="298" width="158" height="28" rx="8" class="msg-bot"/>
    <text x="258" y="317" class="text-white">Kein Problem! Ihr Name? 😊</text>
  </g>

  <!-- Input bar -->
  <rect x="244" y="354" width="192" height="28" class="input-bar"/>
  <rect x="248" y="358" width="148" height="20" rx="10" class="input-field"/>
  <text x="280" y="371" font-family="Arial" font-size="9" fill="#8696a0">Type a message</text>
  <circle cx="422" cy="368" r="10" class="send-btn"/>
  <text x="422" y="372" text-anchor="middle" font-family="Arial" font-size="11" fill="white">↑</text>

  <!-- RIGHT: Flow diagram -->
  <text x="480" y="66" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4ade80" letter-spacing="1" opacity="0.8">HOW IT WORKS</text>

  <g id="flow-n1">
    <rect x="430" y="80" width="100" height="32" rx="6" class="flow-node-accent"/>
    <text x="480" y="100" text-anchor="middle" class="flow-text-accent">Customer WA</text>
  </g>
  <line id="flow-line1" x1="480" y1="112" x2="480" y2="128" class="flow-line" marker-end="url(#arr)"/>
  <g id="flow-n2">
    <rect x="430" y="128" width="100" height="32" rx="6" class="flow-node"/>
    <text x="480" y="148" text-anchor="middle" class="flow-text">Meta Cloud API</text>
  </g>
  <line id="flow-line2" x1="480" y1="160" x2="480" y2="176" class="flow-line" marker-end="url(#arr)"/>
  <g id="flow-n3">
    <rect x="430" y="176" width="100" height="32" rx="6" class="flow-node"/>
    <text x="480" y="196" text-anchor="middle" class="flow-text">FastAPI webhook</text>
  </g>
  <line id="flow-line3" x1="480" y1="208" x2="480" y2="224" class="flow-line" marker-end="url(#arr)"/>
  <g id="flow-n4">
    <rect x="430" y="224" width="100" height="32" rx="6" class="flow-node"/>
    <text x="480" y="244" text-anchor="middle" class="flow-text">Ollama LLaMA3</text>
  </g>
  <line id="flow-line4" x1="480" y1="256" x2="480" y2="272" class="flow-line" marker-end="url(#arr)"/>
  <g id="flow-n5">
    <rect x="430" y="272" width="100" height="32" rx="6" class="flow-node-accent"/>
    <text x="480" y="292" text-anchor="middle" class="flow-text-accent">Reply sent ✓</text>
  </g>

  <rect x="444" y="324" width="72" height="20" rx="4" fill="#46e3b726"/>
  <text x="480" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#46e3b7">render.com</text>
  <rect x="444" y="350" width="72" height="20" rx="4" fill="#ffffff14"/>
  <text x="480" y="364" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffffff99">github ready</text>
</svg>
